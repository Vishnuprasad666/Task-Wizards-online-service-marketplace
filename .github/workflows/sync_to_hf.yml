name: Sync to Hugging Face Hub
on:
  push:
    branches: [deployment]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://vishnuprasad007:$HF_TOKEN@huggingface.co/spaces/vishnuprasad007/Task-Wizards deployment:main
