{% extends 'account/base.html' %}

{% block title %}Payment Checkout - Task Wizards{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto px-4 py-24 text-center">
    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-12 shadow-2xl space-y-8">
        <div class="w-20 h-20 bg-cyan-500/10 rounded-full flex items-center justify-center text-cyan-400 mx-auto border border-cyan-500/20" style="box-shadow: 0 0 30px rgba(6,182,212,0.15)">
            <i class="fa-solid fa-credit-card text-3xl"></i>
        </div>
        
        <div class="space-y-2">
            <h1 class="text-3xl font-black text-white tracking-tight">Confirm Payment</h1>
            <p class="text-zinc-400">You are paying <span class="font-black text-white">₹{{ service.price }}</span> for <span class="font-bold text-zinc-300">"{{ service.title }}"</span></p>
        </div>

        <button id="rzp-button1" class="w-full text-black bg-cyan-500 hover:bg-cyan-400 transition duration-300 font-bold rounded-xl text-sm px-5 py-4 text-lg text-center" style="box-shadow: 0 0 25px rgba(6,182,212,0.35)">
            Pay with Razorpay
        </button>
        
        <p class="text-xs text-zinc-600">Secured and processed by Razorpay</p>
    </div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
    var options = {
        "key": "{{ razorpay_key_id }}",
        "amount": "{{ amount }}",
        "currency": "{{ currency }}",
        "name": "Task Wizards",
        "description": "Payment for {{ service.title }}",
        "order_id": "{{ razorpay_order_id }}",
        "callback_url": "{{ callback_url }}",
        "prefill": {
            "name": "{{ user.username }}",
            "email": "{{ user.email }}",
            "contact": "{{ user.phone }}"
        },
        "theme": {
            "color": "#06b6d4"
        }
    };
    var rzp1 = new Razorpay(options);
    document.getElementById('rzp-button1').onclick = function(e){
        rzp1.open();
        e.preventDefault();
    }
</script>
{% endblock %}
