<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Wizards Notification</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #09090b;
            color: #ffffff;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            text-decoration: none;
            letter-spacing: -0.5px;
        }
        .logo span {
            color: #22d3ee;
        }
        .card {
            background-color: #18181b;
            border: 1px solid #27272a;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
        }
        .icon-container {
            width: 64px;
            height: 64px;
            background-color: rgba(6, 182, 212, 0.1);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }
        /* A simple inline SVG for the bell icon */
        .icon {
            width: 32px;
            height: 32px;
            fill: #22d3ee;
        }
        .greeting {
            font-size: 20px;
            font-weight: 600;
            color: #ffffff;
            margin-top: 0;
            margin-bottom: 16px;
        }
        .message {
            font-size: 16px;
            color: #a1a1aa;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .button {
            display: inline-block;
            background-color: #06b6d4;
            color: #000000;
            font-weight: bold;
            font-size: 16px;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 12px;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: #22d3ee;
        }
        .footer {
            margin-top: 40px;
            text-align: center;
            color: #52525b;
            font-size: 14px;
        }
        .footer a {
            color: #52525b;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="{{ site_url }}" class="logo">Task<span>Wizards</span></a>
        </div>
        
        <div class="card">
            <div class="icon-container">
                <svg class="icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v6z"/>
                </svg>
            </div>
            <h1 class="greeting">Hello, {{ user.first_name|default:user.username }}!</h1>
            <p class="message">
                {{ message }}
            </p>
            {% if link %}
            <a href="{{ site_url }}{{ link }}" class="button">View Details</a>
            {% else %}
            <a href="{{ site_url }}/notifications/" class="button">Go to Dashboard</a>
            {% endif %}
        </div>
        
        <div class="footer">
            <p>You received this email because you are a registered user of Task Wizards.</p>
            <p>&copy; 2026 Task Wizards International Ltd. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
